<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Connecting to SellForMe…</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; display: grid; place-items: center; min-height: 80vh; margin: 0; color: #222; padding: 20px; }
  .card { text-align: center; max-width: 360px; }
  .spinner { width: 28px; height: 28px; border: 3px solid #ddd; border-top-color: #0066cc; border-radius: 50%; animation: spin 0.9s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  a.btn { display: inline-block; margin-top: 16px; padding: 12px 22px; background: #0066cc; color: #fff; text-decoration: none; border-radius: 10px; font-weight: 600; }
  small { color: #777; }
</style>
</head>
<body>
<div class="card">
  <div class="spinner"></div>
  <p>Returning to SellForMe…</p>
  <a id="manual" class="btn" href="#">Open SellForMe</a>
  <p><small>If the app doesn't open automatically, tap the button.</small></p>
</div>

<script>
  (function () {
    var target = "sellforme://callback" + window.location.search;
    var manual = document.getElementById("manual");
    manual.href = target;

    // Strategy 1: meta refresh (lets the WebKit policy decision fire)
    var meta = document.createElement("meta");
    meta.httpEquiv = "refresh";
    meta.content = "0;url=" + target;
    document.head.appendChild(meta);

    // Strategy 2: location.replace
    try { window.location.replace(target); } catch (e) {}

    // Strategy 3: programmatic anchor click
    setTimeout(function () {
      try { manual.click(); } catch (e) {}
    }, 100);

    // Strategy 4: fallback location.href
    setTimeout(function () {
      try { window.location.href = target; } catch (e) {}
    }, 400);
  })();
</script>
</body>
</html>
